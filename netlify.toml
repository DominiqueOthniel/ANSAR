[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"
  included_files = ["server/**"]

# API Netlify (pg → Supabase) — avant le catch-all SPA
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/api"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA Vite
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
