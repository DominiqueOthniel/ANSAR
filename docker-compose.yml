# PostgreSQL pour développement local (ANSAR)
services:
  postgres:
    image: postgres:16-alpine
    container_name: truck-track-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truck_track
    ports:
      - "5432:5432"
    volumes:
      - truck_track_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d truck_track"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  truck_track_pgdata:
