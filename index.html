<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c41e1e" />
    <link rel="icon" type="image/png" href="/logo-ansar.png" />
    <link rel="apple-touch-icon" href="/logo-ansar.png" />
    <title>SIA-ANSAR</title>
    <script>
      // Verrouille le titre avant le chargement React pour éviter les anciens noms de projet en cache.
      document.title = 'SIA-ANSAR';
      new MutationObserver(() => {
        if (document.title !== 'SIA-ANSAR') document.title = 'SIA-ANSAR';
      }).observe(document.querySelector('title'), { childList: true });
    </script>
    <meta name="description" content="SIA-ANSAR" />
    <meta name="author" content="SIA-ANSAR" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="SIA-ANSAR" />
    <meta property="og:description" content="SIA-ANSAR" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
